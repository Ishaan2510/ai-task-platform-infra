apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: ai-task-platform
data:
  NODE_ENV: "production"
  PORT: "5000"
  FRONTEND_URL: "http://localhost"
  MONGO_URI: "mongodb://admin:adminpass@mongodb-service:27017/aitaskplatform?authSource=admin"
  REDIS_URL: "redis://redis-service:6379"
  JWT_EXPIRES_IN: "7d"